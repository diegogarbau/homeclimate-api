services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - OPEN_METEO_URL=https://api.open-meteo.com/v1
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CACHE_TTL_MINUTES=30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3