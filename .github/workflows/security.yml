name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan (Mondays 06:00 UTC) to catch newly disclosed vulnerabilities.
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  GO_VERSION: "1.25.11"

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}
          repo-checkout: false

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gosec
        uses: securego/gosec@master
        with:
          # G107: outbound HTTP requests use non-constant URLs, but the base
          #       comes from trusted config (Open-Meteo) or a hardcoded constant
          #       (Nominatim); paths are fixed. Not user-controlled -> not SSRF.
          args: "-exclude=G107 -exclude-generated ./..."
