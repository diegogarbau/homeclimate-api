version: "2"

run:
  timeout: 5m

# Requires golangci-lint v2 (installed via golangci-lint-action@v7).
# In v2 the default linters (errcheck, govet, ineffassign, staticcheck,
# unused) are enabled automatically. misspell is intentionally omitted
# because the codebase has Spanish comments an English dictionary would flag.
linters:
  exclusions:
    rules:
      # Test files may ignore errors for brevity in assertions.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
